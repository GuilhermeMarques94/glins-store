<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Categorias — Glins Store Admin</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .admin-sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      font-family: var(--font-title);
      font-size: 1rem;
      color: var(--primary);
      letter-spacing: 0.1em;
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .sidebar-brand span {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .admin-nav { flex: 1; }
    .admin-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: var(--text-light);
      font-size: 0.88rem;
      transition: var(--transition);
      border-right: 2px solid transparent;
    }
    .admin-nav a:hover,
    .admin-nav a.active {
      background: rgba(201,162,39,0.08);
      color: var(--primary);
      border-right-color: var(--primary);
    }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .sidebar-footer a {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-footer a:hover { color: var(--primary); }

    .admin-main { padding: 32px; background: var(--bg-surface); }
    .admin-header { margin-bottom: 28px; }
    .admin-header h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-family: var(--font-title);
      font-size: 0.75rem;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(201,162,39,0.03); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal h2 { margin-bottom: 24px; font-size: 1.2rem; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      color: var(--text-muted); font-size: 1.4rem;
      cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--danger); }

    .badge-gold { background: rgba(201,162,39,0.15); color: var(--primary); }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar {
        height: auto; position: static;
        flex-direction: row; flex-wrap: wrap; padding: 12px;
      }
      .sidebar-brand { border-bottom: none; padding-bottom: 0; }
      .admin-nav { display: flex; flex-wrap: wrap; }
      .admin-nav a {
        padding: 8px 12px;
        border-right: none;
        border-bottom: 2px solid transparent;
      }
      .admin-nav a.active {
        border-right: none;
        border-bottom-color: var(--primary);
      }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="modal-container"></div>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      👑 GLINS STORE
      <span>Painel Administrativo</span>
    </div>
    <nav class="admin-nav">
      <a href="/pages/admin/dashboard.html">📊 Dashboard</a>
      <a href="/pages/admin/products.html">📦 Produtos</a>
      <a href="/pages/admin/categories.html" class="active">📂 Categorias</a>
      <a href="/pages/admin/orders.html">📋 Pedidos</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/index.html">← Voltar à Loja</a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-header flex-between">
      <div>
        <h1>📂 Categorias</h1>
        <p class="text-muted">Organize os produtos por categoria</p>
      </div>
      <button class="btn btn-primary" onclick="openCategoryModal()">+ Nova Categoria</button>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Ícone</th>
              <th>Nome</th>
              <th>Slug</th>
              <th>Produtos</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="categories-table">
            <tr>
              <td colspan="5" class="text-center">
                <div class="loader"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script>
  if (!requireAdmin()) {}

  // ════════════════════════════════════════
  //  MODAL
  // ════════════════════════════════════════
  function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
  }
  document.getElementById('modal-container').addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ════════════════════════════════════════
  //  ESTADO
  // ════════════════════════════════════════
  let categories = [];

  // ════════════════════════════════════════
  //  HELPERS
  // ════════════════════════════════════════
  function toArray(response) {
    if (!response) return [];
    if (Array.isArray(response)) return response;
    if (Array.isArray(response.results)) return response.results;
    const keys = Object.keys(response);
    for (const k of keys) {
      if (Array.isArray(response[k])) return response[k];
    }
    return [];
  }

  // ════════════════════════════════════════
  //  CARREGAR CATEGORIAS
  // ════════════════════════════════════════
  async function loadCategories() {
    const tb = document.getElementById('categories-table');
    tb.innerHTML = '<tr><td colspan="5" class="text-center"><div class="loader"></div></td></tr>';

    try {
      const rawCats = await API.categories.list();
      categories    = toArray(rawCats);

      tb.innerHTML = categories.length
        ? categories.map(c => `
            <tr>
              <td style="font-size:1.6rem">${c.icon || '🏷️'}</td>
              <td><strong>${c.name}</strong></td>
              <td>
                <code style="color:var(--text-muted);font-size:0.82rem">
                  ${c.slug}
                </code>
              </td>
              <td>
                <span class="badge badge-gold">${c.product_count ?? 0}</span>
              </td>
              <td style="white-space:nowrap">
                <button class="btn btn-outline btn-sm"
                        onclick="openCategoryModal(${c.id})"
                        title="Editar">✏️</button>
                <button class="btn btn-danger btn-sm"
                        onclick="deleteCategory(${c.id}, '${(c.name || '').replace(/'/g, "\\'")}')">
                  🗑️
                </button>
              </td>
            </tr>`).join('')
        : '<tr><td colspan="5" class="text-muted text-center" style="padding:20px">Nenhuma categoria cadastrada.</td></tr>';

    } catch (e) {
      console.error('[Categorias]', e);
      tb.innerHTML = '<tr><td colspan="5" class="text-muted text-center" style="padding:20px">❌ Erro ao carregar categorias</td></tr>';
    }
  }

  // ════════════════════════════════════════
  //  MODAL CATEGORIA
  // ════════════════════════════════════════
  function openCategoryModal(id = null) {
    const isEdit = id !== null;
    closeModal();

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>${isEdit ? '✏️ Editar Categoria' : '📂 Nova Categoria'}</h2>
        <form id="categoryForm">
          <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="cName" class="form-control"
                   required placeholder="Ex: Pokémon"/>
          </div>
          <div class="form-group">
            <label>Slug *</label>
            <input type="text" id="cSlug" class="form-control"
                   required placeholder="Ex: pokemon"/>
          </div>
          <div class="form-group">
            <label>Ícone (emoji)</label>
            <input type="text" id="cIcon" class="form-control"
                   placeholder="⚔️"/>
          </div>
          <div class="flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary" id="saveCategoryBtn">
              ${isEdit ? '💾 Salvar' : '➕ Criar'}
            </button>
            <button type="button" class="btn btn-outline"
                    onclick="closeModal()">Cancelar</button>
          </div>
        </form>
      </div>`;

    document.getElementById('modal-container').appendChild(modal);

    // Auto-gerar slug ao digitar nome (apenas criação)
    document.getElementById('cName').addEventListener('input', (e) => {
      if (!isEdit) {
        document.getElementById('cSlug').value = e.target.value
          .toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/\s+/g, '-')
          .replace(/[^a-z0-9-]/g, '');
      }
    });

    // Preencher campos ao editar
    if (isEdit) {
      const cat = categories.find(c => c.id === id);
      if (cat) {
        document.getElementById('cName').value = cat.name;
        document.getElementById('cSlug').value = cat.slug;
        document.getElementById('cIcon').value = cat.icon || '';
      }
    }

    // Submit
    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn       = document.getElementById('saveCategoryBtn');
      btn.disabled    = true;
      btn.textContent = '⏳ Salvando...';

      const data = {
        name: document.getElementById('cName').value.trim(),
        slug: document.getElementById('cSlug').value.trim(),
        icon: document.getElementById('cIcon').value.trim(),
      };

      try {
        if (isEdit) {
          await API.categories.update(id, data);
        } else {
          await API.categories.create(data);
        }
        showToast(isEdit ? '✅ Categoria atualizada!' : '✅ Categoria criada!', 'success');
        closeModal();
        loadCategories();
      } catch (err) {
        console.error('[Salvar Categoria]', err);
        const msg = err?.name?.[0] || err?.slug?.[0] || err?.detail || 'Erro ao salvar categoria';
        showToast(msg, 'error');
        btn.disabled    = false;
        btn.textContent = isEdit ? '💾 Salvar' : '➕ Criar';
      }
    });
  }

  // ════════════════════════════════════════
  //  DELETAR CATEGORIA
  // ════════════════════════════════════════
  async function deleteCategory(id, name) {
    if (!confirm(`Deletar a categoria "${name}"?\nOs produtos vinculados ficarão sem categoria.`)) return;
    try {
      await API.categories.delete(id);
      showToast('Categoria deletada', 'success');
      loadCategories();
    } catch (_) {
      showToast('Erro ao deletar categoria', 'error');
    }
  }

  // ════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════
  loadCategories();
</script>
</body>
</html>
