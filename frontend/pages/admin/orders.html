<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pedidos — Glins Store Admin</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .admin-sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      font-family: var(--font-title);
      font-size: 1rem;
      color: var(--primary);
      letter-spacing: 0.1em;
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .sidebar-brand span {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .admin-nav { flex: 1; }
    .admin-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: var(--text-light);
      font-size: 0.88rem;
      transition: var(--transition);
      border-right: 2px solid transparent;
    }
    .admin-nav a:hover,
    .admin-nav a.active {
      background: rgba(201,162,39,0.08);
      color: var(--primary);
      border-right-color: var(--primary);
    }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .sidebar-footer a {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-footer a:hover { color: var(--primary); }

    .admin-main { padding: 32px; background: var(--bg-surface); }
    .admin-header { margin-bottom: 28px; }
    .admin-header h1 { font-size: 1.6rem; margin-bottom: 4px; }

    /* Filtros */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-bar input,
    .filter-bar select { flex: 1; min-width: 140px; }

    /* Tabela */
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-family: var(--font-title);
      font-size: 0.75rem;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(201,162,39,0.03); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal h2 { margin-bottom: 20px; font-size: 1.2rem; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      color: var(--text-muted); font-size: 1.4rem;
      cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--danger); }

    /* Info cliente */
    .customer-info {
      background: var(--bg-surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      font-size: 0.88rem;
    }
    .customer-info p { margin: 4px 0; color: var(--text-muted); }
    .customer-info strong { color: var(--text-light); }
    .info-label {
      font-size: 0.72rem;
      color: var(--primary);
      font-family: var(--font-title);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Itens */
    .order-items-list { margin: 12px 0 16px; }
    .order-item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-row img {
      width: 48px; height: 48px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .order-item-info { flex: 1; }
    .order-item-info strong { display: block; font-size: 0.88rem; }
    .order-item-info span { font-size: 0.8rem; color: var(--text-muted); }
    .product-thumb-placeholder {
      width: 48px; height: 48px;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    /* Resumo */
    .order-summary {
      background: var(--bg-surface);
      border-radius: var(--radius);
      padding: 16px;
      margin: 16px 0;
    }
    .order-summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      padding: 4px 0;
      color: var(--text-muted);
    }
    .order-summary-row.total {
      font-family: var(--font-title);
      color: var(--primary);
      font-size: 1rem;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }

    /* Grid form */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar {
        height: auto; position: static;
        flex-direction: row; flex-wrap: wrap; padding: 12px;
      }
      .sidebar-brand { border-bottom: none; padding-bottom: 0; }
      .admin-nav { display: flex; flex-wrap: wrap; }
      .admin-nav a {
        padding: 8px 12px;
        border-right: none;
        border-bottom: 2px solid transparent;
      }
      .admin-nav a.active {
        border-right: none;
        border-bottom-color: var(--primary);
      }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="modal-container"></div>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      👑 GLINS STORE
      <span>Painel Administrativo</span>
    </div>
    <nav class="admin-nav">
      <a href="/pages/admin/dashboard.html">📊 Dashboard</a>
      <a href="/pages/admin/products.html">📦 Produtos</a>
      <a href="/pages/admin/categories.html">📂 Categorias</a>
      <a href="/pages/admin/orders.html" class="active">📋 Pedidos</a>
      <a href="/pages/admin/customers.html">👥 Clientes</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/index.html">← Voltar à Loja</a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>📋 Pedidos</h1>
      <p class="text-muted">Acompanhe e gerencie todos os pedidos</p>
    </div>

    <div class="filter-bar">
      <input type="text" class="form-control" id="orderSearch"
             placeholder="🔍 Buscar por cliente ou #ID..."
             oninput="filterOrders()"/>
      <select class="form-control" id="orderStatusFilter" onchange="loadOrders()">
        <option value="">Todos os status</option>
        <option value="pending">⏳ Aguardando pagamento</option>
        <option value="paid">✅ Pago</option>
        <option value="preparing">🔨 Preparando</option>
        <option value="shipped">🚚 Enviado</option>
        <option value="delivered">📦 Entregue</option>
        <option value="cancelled">❌ Cancelado</option>
      </select>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>E-mail</th>
              <th>Itens</th>
              <th>Total</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="orders-table">
            <tr>
              <td colspan="8" class="text-center">
                <div class="loader"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div id="orders-pagination"
           style="display:flex; align-items:center; justify-content:space-between;
                  flex-wrap:wrap; gap:12px; padding:16px; border-top:1px solid var(--border)">
      </div>
    </div>
  </main>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script>
  if (!requireAdmin()) {}

  // ════════════════════════════════════════
  //  ESTADO
  // ════════════════════════════════════════
  let allOrders        = [];
  let orderCurrentPage = 1;
  let orderTotalCount  = 0;
  const ORDERS_PER_PAGE = 20;

  // ════════════════════════════════════════
  //  MODAL
  // ════════════════════════════════════════
  function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
  }
  document.getElementById('modal-container').addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ════════════════════════════════════════
  //  HELPERS
  // ════════════════════════════════════════
  function toArray(response) {
    if (!response) return [];
    if (Array.isArray(response)) return response;
    if (Array.isArray(response.results)) return response.results;
    const keys = Object.keys(response);
    for (const k of keys) {
      if (Array.isArray(response[k])) return response[k];
    }
    return [];
  }

  function getClientName(order) {
    if (order.user?.name)       return order.user.name;
    if (order.user?.first_name) return `${order.user.first_name} ${order.user.last_name || ''}`.trim();
    if (order.user?.username)   return order.user.username;
    if (order.user?.email)      return order.user.email;
    if (order.customer_name)    return order.customer_name;
    if (order.customer?.name)   return order.customer.name;
    if (typeof order.shipping_address === 'object' && order.shipping_address?.name)
      return order.shipping_address.name;
    return `#${order.id}`;
  }

  function getClientEmail(order) {
    if (order.user?.email)     return order.user.email;
    if (order.customer_email)  return order.customer_email;
    if (order.customer?.email) return order.customer.email;
    return '—';
  }

  function formatDate(dt) {
    if (!dt) return '—';
    return new Date(dt).toLocaleDateString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  // ════════════════════════════════════════
  //  CARREGAR PEDIDOS
  // ════════════════════════════════════════
  async function loadOrders() {
    const tb = document.getElementById('orders-table');
    tb.innerHTML = '<tr><td colspan="8" class="text-center"><div class="loader"></div></td></tr>';
    document.getElementById('orders-pagination').innerHTML = '';

    const filter = document.getElementById('orderStatusFilter')?.value || '';

    try {
      const rawOrders = await API.orders.adminList(filter ? { status: filter } : {});

      if (rawOrders && typeof rawOrders === 'object' && 'results' in rawOrders) {
        allOrders       = rawOrders.results;
        orderTotalCount = rawOrders.count;
      } else {
        allOrders       = toArray(rawOrders);
        orderTotalCount = allOrders.length;
      }

      // aplicar busca local se houver texto
      const search = document.getElementById('orderSearch')?.value?.trim().toLowerCase() || '';
      const filtered = search ? allOrders.filter(o =>
        getClientName(o).toLowerCase().includes(search) ||
        getClientEmail(o).toLowerCase().includes(search) ||
        String(o.id).includes(search)
      ) : allOrders;

      renderOrders(filtered);
      renderPagination(filtered.length);

    } catch (e) {
      console.error('[Pedidos]', e);
      tb.innerHTML = `<tr><td colspan="8" class="text-muted text-center" style="padding:20px">
        ❌ Erro ao carregar pedidos: ${e?.detail || e?.message || ''}
      </td></tr>`;
    }
  }

  // ════════════════════════════════════════
  //  FILTRO LOCAL (busca por texto)
  // ════════════════════════════════════════
  function filterOrders() {
    const search = document.getElementById('orderSearch').value.toLowerCase();
    const filtered = allOrders.filter(o =>
      getClientName(o).toLowerCase().includes(search) ||
      getClientEmail(o).toLowerCase().includes(search) ||
      String(o.id).includes(search)
    );
    renderOrders(filtered);
    renderPagination(filtered.length);
  }

  // ════════════════════════════════════════
  //  RENDERIZAR TABELA
  // ════════════════════════════════════════
  function renderOrders(orders) {
    const tb = document.getElementById('orders-table');
    if (!orders.length) {
      tb.innerHTML = '<tr><td colspan="8" class="text-muted text-center" style="padding:20px">Nenhum pedido encontrado.</td></tr>';
      return;
    }

    // paginação local
    const start = (orderCurrentPage - 1) * ORDERS_PER_PAGE;
    const page  = orders.slice(start, start + ORDERS_PER_PAGE);

    tb.innerHTML = page.map(o => {
      const itemCount = o.items?.length ?? o.order_items?.length ?? o.item_count ?? o.items_count ?? '—';
      return `
        <tr>
          <td><strong>#${o.id}</strong></td>
          <td>${getClientName(o)}</td>
          <td style="font-size:0.82rem;color:var(--text-muted)">${getClientEmail(o)}</td>
          <td>
            <span class="badge badge-gold">${itemCount} ${itemCount === 1 ? 'item' : 'itens'}</span>
          </td>
          <td><strong>${formatPrice(o.total)}</strong></td>
          <td>${statusBadge(o.status)}</td>
          <td style="white-space:nowrap;font-size:0.8rem;color:var(--text-muted)">
            ${formatDate(o.created_at)}
          </td>
          <td>
            <button class="btn btn-outline btn-sm"
                    onclick="openOrderModal(${o.id})"
                    title="Ver detalhes">🔍 Detalhes</button>
          </td>
        </tr>`;
    }).join('');
  }

  // ════════════════════════════════════════
  //  PAGINAÇÃO
  // ════════════════════════════════════════
  function renderPagination(total) {
    const container  = document.getElementById('orders-pagination');
    const totalPages = Math.ceil(total / ORDERS_PER_PAGE);
    const start      = (orderCurrentPage - 1) * ORDERS_PER_PAGE + 1;
    const end        = Math.min(orderCurrentPage * ORDERS_PER_PAGE, total);

    if (totalPages <= 1) {
      container.innerHTML = `<span class="text-muted" style="font-size:0.82rem">
        ${total} pedido${total !== 1 ? 's' : ''} encontrado${total !== 1 ? 's' : ''}
      </span>`;
      return;
    }

    const pages = [];
    const delta = 2;
    for (let i = Math.max(1, orderCurrentPage - delta);
             i <= Math.min(totalPages, orderCurrentPage + delta); i++) {
      pages.push(i);
    }

    const btnStyle = (active) =>
      `style="padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:0.82rem;
              border:1px solid ${active ? 'var(--primary)' : 'var(--border)'};
              background:${active ? 'var(--primary)' : 'transparent'};
              color:${active ? '#000' : 'var(--text-light)'}"`;

    container.innerHTML = `
      <span class="text-muted" style="font-size:0.82rem">
        Exibindo <strong>${start}–${end}</strong> de <strong>${total}</strong> pedidos
      </span>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button ${btnStyle(false)} onclick="goPage(1)"
                ${orderCurrentPage === 1 ? 'disabled' : ''}>«</button>
        <button ${btnStyle(false)} onclick="goPage(${orderCurrentPage - 1})"
                ${orderCurrentPage === 1 ? 'disabled' : ''}>‹</button>
        ${pages.map(p => `
          <button ${btnStyle(p === orderCurrentPage)}
                  onclick="goPage(${p})">${p}</button>`).join('')}
        <button ${btnStyle(false)} onclick="goPage(${orderCurrentPage + 1})"
                ${orderCurrentPage === totalPages ? 'disabled' : ''}>›</button>
        <button ${btnStyle(false)} onclick="goPage(${totalPages})"
                ${orderCurrentPage === totalPages ? 'disabled' : ''}>»</button>
      </div>`;
  }

  function goPage(p) {
    orderCurrentPage = p;
    filterOrders();
  }

  // ════════════════════════════════════════
  //  MODAL DETALHES DO PEDIDO
  // ════════════════════════════════════════
  async function openOrderModal(id) {
    closeModal();

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal" style="max-width:560px">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>📋 Pedido <span style="color:var(--primary)">#${id}</span></h2>
        <div id="orderDetail">
          <div class="loader" style="margin:20px auto"></div>
        </div>
      </div>`;

    document.getElementById('modal-container').appendChild(modal);

    try {
      const o = await API.orders.adminDetail(id);
      const items = toArray(o.items || o.order_items);

      // ── Endereço: tenta campos diretos primeiro, depois objeto aninhado ──
      let addrHtml = '';
      if (o.street) {
        addrHtml = `
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
            <div class="info-label" style="margin-bottom:6px">📍 Endereço de Entrega</div>
            <p>${o.street}, ${o.number || 's/n'}${o.complement ? ` — ${o.complement}` : ''}</p>
            <p>${o.city || ''} / ${o.state || ''}&nbsp;·&nbsp; CEP: ${o.zipcode || o.zip_code || '—'}</p>
          </div>`;
      } else if (o.shipping_address && typeof o.shipping_address === 'object') {
        const a = o.shipping_address;
        const line1 = [a.street, a.number].filter(Boolean).join(', ');
        const line2 = [a.city, a.state].filter(Boolean).join(' / ');
        if (line1 || line2) {
          addrHtml = `
            <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
              <div class="info-label" style="margin-bottom:6px">📍 Endereço de Entrega</div>
              ${line1 ? `<p>${line1}${a.complement ? ` — ${a.complement}` : ''}</p>` : ''}
              ${line2 ? `<p>${line2}${a.zipcode || a.zip_code ? `&nbsp;·&nbsp; CEP: ${a.zipcode || a.zip_code}` : ''}</p>` : ''}
            </div>`;
        }
      } else if (typeof o.shipping_address === 'string' && o.shipping_address) {
        addrHtml = `
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
            <div class="info-label" style="margin-bottom:6px">📍 Endereço de Entrega</div>
            <p>${o.shipping_address}</p>
          </div>`;
      }

      document.getElementById('orderDetail').innerHTML = `

        <!-- Cliente -->
        <div class="customer-info">
          <div class="info-label">👤 Cliente</div>
          <p><strong>${getClientName(o)}</strong></p>
          <p>📧 ${getClientEmail(o)}</p>
          ${addrHtml}
          ${o.tracking_code
            ? `<p style="margin-top:8px">🚚 Rastreio: <strong>${o.tracking_code}</strong></p>`
            : ''}
        </div>

        <!-- Itens -->
        <div class="info-label">🛍️ Itens do Pedido</div>
        <div class="order-items-list">
          ${items.length
            ? items.map(item => {
                const name  = item.product_name || item.name || item.product?.name || `Produto #${item.product}`;
                const img   = item.product_image || item.image || item.image_url ||
                              item.product?.image_url || item.product?.image || null;
                const price = parseFloat(item.unit_price ?? item.price ?? 0);
                const qty   = parseInt(item.quantity) || 1;
                return `
                  <div class="order-item-row">
                    ${img
                      ? `<img src="${img}" alt="${name}"
                               onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
                         <div class="product-thumb-placeholder" style="display:none">🏺</div>`
                      : `<div class="product-thumb-placeholder">🏺</div>`}
                    <div class="order-item-info">
                      <strong>${name}</strong>
                      <span>Qtd: ${qty} × ${formatPrice(price)}</span>
                    </div>
                    <strong>${formatPrice(qty * price)}</strong>
                  </div>`;
              }).join('')
            : '<p class="text-muted" style="font-size:0.85rem;padding:8px 0">Sem itens registrados.</p>'}
        </div>

        <!-- Resumo financeiro -->
        <div class="order-summary">
          <div class="order-summary-row">
            <span>Subtotal</span>
            <span>${formatPrice(o.subtotal || o.total)}</span>
          </div>
          ${o.shipping_cost
            ? `<div class="order-summary-row">
                 <span>🚚 Frete</span>
                 <span>${formatPrice(o.shipping_cost)}</span>
               </div>` : ''}
          ${o.discount
            ? `<div class="order-summary-row">
                 <span>🏷️ Desconto</span>
                 <span>-${formatPrice(o.discount)}</span>
               </div>` : ''}
          <div class="order-summary-row total">
            <span>Total</span>
            <span>${formatPrice(o.total)}</span>
          </div>
        </div>

        <!-- Atualizar pedido -->
        <div class="info-label" style="margin-top:16px">⚙️ Atualizar Pedido</div>
        <form id="orderForm">
          <div class="grid-2">
            <div class="form-group">
              <label>Status</label>
              <select id="oStatus" class="form-control">
                <option value="pending"   ${o.status === 'pending'   ? 'selected' : ''}>⏳ Aguardando</option>
                <option value="paid"      ${o.status === 'paid'      ? 'selected' : ''}>✅ Pago</option>
                <option value="preparing" ${o.status === 'preparing' ? 'selected' : ''}>🔨 Preparando</option>
                <option value="shipped"   ${o.status === 'shipped'   ? 'selected' : ''}>🚚 Enviado</option>
                <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>📦 Entregue</option>
                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>❌ Cancelado</option>
              </select>
            </div>
            <div class="form-group">
              <label>Código de Rastreio</label>
              <input type="text" id="oTracking" class="form-control"
                     placeholder="AA000000000BR"
                     value="${o.tracking_code || ''}"/>
            </div>
          </div>
          <div class="flex gap-2">
            <button type="submit" class="btn btn-primary">💾 Salvar alterações</button>
            <button type="button" class="btn btn-outline" onclick="closeModal()">Fechar</button>
          </div>
        </form>`;

      // submit do form
      document.getElementById('orderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled    = true;
        btn.textContent = '⏳ Salvando...';

        try {
          await API.orders.adminUpdate(id, {
            status:        document.getElementById('oStatus').value,
            tracking_code: document.getElementById('oTracking').value,
          });
          showToast('✅ Pedido atualizado!', 'success');
          closeModal();
          loadOrders();
        } catch (err) {
          console.error('[Salvar Pedido]', err);
          showToast(err?.detail || 'Erro ao atualizar pedido', 'error');
          btn.disabled    = false;
          btn.textContent = '💾 Salvar alterações';
        }
      });

    } catch (e) {
      console.error('[Order Modal]', e);
      document.getElementById('orderDetail').innerHTML =
        `<p class="text-muted text-center" style="padding:20px">
          ❌ Erro ao carregar pedido: ${e?.detail || e?.message || ''}
        </p>`;
    }
  }

  // ════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════
  loadOrders();
</script>
</body>
</html>
