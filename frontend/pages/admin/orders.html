<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pedidos — Glins Store Admin</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .admin-sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      font-family: var(--font-title);
      font-size: 1rem;
      color: var(--primary);
      letter-spacing: 0.1em;
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .sidebar-brand span {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .admin-nav { flex: 1; }
    .admin-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: var(--text-light);
      font-size: 0.88rem;
      transition: var(--transition);
      border-right: 2px solid transparent;
    }
    .admin-nav a:hover,
    .admin-nav a.active {
      background: rgba(201,162,39,0.08);
      color: var(--primary);
      border-right-color: var(--primary);
    }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .sidebar-footer a {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-footer a:hover { color: var(--primary); }

    .admin-main { padding: 32px; background: var(--bg-surface); }
    .admin-header { margin-bottom: 28px; }
    .admin-header h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* Filtros */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-bar input,
    .filter-bar select { flex: 1; min-width: 140px; }

    /* Tabela */
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-family: var(--font-title);
      font-size: 0.75rem;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(201,162,39,0.03); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal h2 { margin-bottom: 20px; font-size: 1.2rem; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      color: var(--text-muted); font-size: 1.4rem;
      cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--danger); }

    /* Detalhes pedido */
    .order-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .order-info-item label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .order-info-item span {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text-light);
    }

    .order-items-title {
      font-family: var(--font-title);
      font-size: 0.78rem;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .order-items-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .order-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      gap: 10px;
    }
    .order-item-row .item-name {
      flex: 1;
      font-size: 0.88rem;
    }
    .order-item-row .item-qty {
      color: var(--text-muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }
    .order-item-row .item-price {
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
    }

    .order-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .order-total-row span { color: var(--text-muted); }
    .order-total-row strong { font-size: 1.1rem; color: var(--primary); }

    .status-select-wrap {
      display: flex; gap: 10px; align-items: flex-end; margin-top: 16px;
    }
    .status-select-wrap .form-group { margin: 0; flex: 1; }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar {
        height: auto; position: static;
        flex-direction: row; flex-wrap: wrap; padding: 12px;
      }
      .sidebar-brand { border-bottom: none; padding-bottom: 0; }
      .admin-nav { display: flex; flex-wrap: wrap; }
      .admin-nav a {
        padding: 8px 12px;
        border-right: none;
        border-bottom: 2px solid transparent;
      }
      .admin-nav a.active {
        border-right: none;
        border-bottom-color: var(--primary);
      }
      .order-info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="modal-container"></div>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      👑 GLINS STORE
      <span>Painel Administrativo</span>
    </div>
    <nav class="admin-nav">
      <a href="/pages/admin/dashboard.html">📊 Dashboard</a>
      <a href="/pages/admin/products.html">📦 Produtos</a>
      <a href="/pages/admin/categories.html">📂 Categorias</a>
      <a href="/pages/admin/orders.html" class="active">📋 Pedidos</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/index.html">← Voltar à Loja</a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>📋 Pedidos</h1>
      <p class="text-muted">Acompanhe e gerencie todos os pedidos</p>
    </div>

    <div class="filter-bar">
      <input type="text" class="form-control" id="orderSearch"
             placeholder="🔍 Buscar por cliente ou #ID..."
             oninput="debounceSearch()"/>
      <select class="form-control" id="orderStatusFilter" onchange="applyFilters()">
        <option value="">Todos os status</option>
        <option value="pending">⏳ Aguardando pagamento</option>
        <option value="paid">💳 Pago</option>
        <option value="processing">⚙️ Em processamento</option>
        <option value="shipped">🚚 Enviado</option>
        <option value="delivered">✅ Entregue</option>
        <option value="cancelled">❌ Cancelado</option>
      </select>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>Itens</th>
              <th>Total</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="orders-table">
            <tr>
              <td colspan="7" class="text-center">
                <div class="loader"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div id="orders-pagination"
           style="display:flex; align-items:center; justify-content:space-between;
                  flex-wrap:wrap; gap:12px; padding:16px; border-top:1px solid var(--border)">
      </div>
    </div>
  </main>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script>
  if (!requireAdmin()) {}

  // ════════════════════════════════════════
  //  ESTADO
  // ════════════════════════════════════════
  let orderCurrentPage = 1;
  let orderTotalCount  = 0;
  const ORDERS_PER_PAGE = 20;
  let searchDebounceTimer = null;

  // ════════════════════════════════════════
  //  MODAL
  // ════════════════════════════════════════
  function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
  }
  document.getElementById('modal-container').addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ════════════════════════════════════════
  //  HELPERS
  // ════════════════════════════════════════
  function toArray(response) {
    if (!response) return [];
    if (Array.isArray(response)) return response;
    if (Array.isArray(response.results)) return response.results;
    const keys = Object.keys(response);
    for (const k of keys) {
      if (Array.isArray(response[k])) return response[k];
    }
    return [];
  }

  function getClientName(order) {
    if (order.user?.name)       return order.user.name;
    if (order.user?.first_name) return `${order.user.first_name} ${order.user.last_name || ''}`.trim();
    if (order.user?.username)   return order.user.username;
    if (order.user?.email)      return order.user.email;
    if (order.customer_name)    return order.customer_name;
    if (order.customer?.name)   return order.customer.name;
    if (typeof order.shipping_address === 'object' && order.shipping_address?.name)
      return order.shipping_address.name;
    return `#${order.id}`;
  }

  function formatDate(dt) {
    if (!dt) return '—';
    return new Date(dt).toLocaleDateString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  const STATUS_LABELS = {
    pending:    { label: 'Aguardando',    badge: 'badge-gold' },
    paid:       { label: 'Pago',          badge: 'badge-success' },
    processing: { label: 'Processando',   badge: 'badge-gold' },
    shipped:    { label: 'Enviado',       badge: 'badge-info' },
    delivered:  { label: 'Entregue',      badge: 'badge-success' },
    cancelled:  { label: 'Cancelado',     badge: 'badge-danger' },
  };

  function renderStatus(status) {
    const s = STATUS_LABELS[status] || { label: status || '—', badge: 'badge-muted' };
    return `<span class="badge ${s.badge}">${s.label}</span>`;
  }

  // ════════════════════════════════════════
  //  BUSCA / FILTROS
  // ════════════════════════════════════════
  function debounceSearch() {
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      orderCurrentPage = 1;
      loadOrders(1);
    }, 400);
  }

  function applyFilters() {
    orderCurrentPage = 1;
    loadOrders(1);
  }

  // ════════════════════════════════════════
  //  CARREGAR PEDIDOS
  // ════════════════════════════════════════
  async function loadOrders(page = null) {
    if (page !== null) orderCurrentPage = page;

    const tb = document.getElementById('orders-table');
    tb.innerHTML = '<tr><td colspan="7" class="text-center"><div class="loader"></div></td></tr>';
    document.getElementById('orders-pagination').innerHTML = '';

    const search = document.getElementById('orderSearch')?.value?.trim()  || '';
    const status = document.getElementById('orderStatusFilter')?.value    || '';

    const params = { page: orderCurrentPage };
    if (search) params.search = search;
    if (status) params.status = status;

    try {
      const rawOrders = await API.orders.adminList(params);

      let orders = [];
      if (rawOrders && typeof rawOrders === 'object' && 'results' in rawOrders) {
        orders          = rawOrders.results;
        orderTotalCount = rawOrders.count;
      } else {
        orders          = toArray(rawOrders);
        orderTotalCount = orders.length;
      }

      renderOrders(orders);
      renderPagination();

    } catch (e) {
      console.error('[Pedidos]', e);
      tb.innerHTML = `<tr><td colspan="7" class="text-muted text-center" style="padding:20px">
        ❌ Erro ao carregar pedidos: ${e?.detail || e?.message || ''}
      </td></tr>`;
    }
  }

  // ════════════════════════════════════════
  //  RENDERIZAR TABELA
  // ════════════════════════════════════════
  function renderOrders(orders) {
    const tb = document.getElementById('orders-table');
    if (!orders.length) {
      tb.innerHTML = '<tr><td colspan="7" class="text-muted text-center" style="padding:20px">Nenhum pedido encontrado.</td></tr>';
      return;
    }
    tb.innerHTML = orders.map(o => {
      const itemCount = o.items?.length ?? o.order_items?.length ?? '—';
      return `
        <tr>
          <td><strong>#${o.id}</strong></td>
          <td>${getClientName(o)}</td>
          <td>
            <span class="badge badge-muted">${itemCount} item${itemCount !== 1 ? 's' : ''}</span>
          </td>
          <td><strong>${formatPrice(o.total)}</strong></td>
          <td>${renderStatus(o.status)}</td>
          <td style="white-space:nowrap;font-size:0.8rem;color:var(--text-muted)">
            ${formatDate(o.created_at)}
          </td>
          <td>
            <button class="btn btn-outline btn-sm"
                    onclick="openOrderModal(${o.id})"
                    title="Ver detalhes">👁️</button>
          </td>
        </tr>`;
    }).join('');
  }

  // ════════════════════════════════════════
  //  PAGINAÇÃO
  // ════════════════════════════════════════
  function renderPagination() {
    const container  = document.getElementById('orders-pagination');
    const totalPages = Math.ceil(orderTotalCount / ORDERS_PER_PAGE);
    const start      = (orderCurrentPage - 1) * ORDERS_PER_PAGE + 1;
    const end        = Math.min(orderCurrentPage * ORDERS_PER_PAGE, orderTotalCount);

    if (totalPages <= 1) {
      container.innerHTML = `<span class="text-muted" style="font-size:0.82rem">
        ${orderTotalCount} pedido${orderTotalCount !== 1 ? 's' : ''} encontrado${orderTotalCount !== 1 ? 's' : ''}
      </span>`;
      return;
    }

    const pages = [];
    const delta = 2;
    for (let i = Math.max(1, orderCurrentPage - delta);
             i <= Math.min(totalPages, orderCurrentPage + delta); i++) {
      pages.push(i);
    }

    const btnStyle = (active) =>
      `style="padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:0.82rem;
              border:1px solid ${active ? 'var(--primary)' : 'var(--border)'};
              background:${active ? 'var(--primary)' : 'transparent'};
              color:${active ? '#000' : 'var(--text-light)'}"`;

    container.innerHTML = `
      <span class="text-muted" style="font-size:0.82rem">
        Exibindo <strong>${start}–${end}</strong> de <strong>${orderTotalCount}</strong> pedidos
      </span>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button ${btnStyle(false)} onclick="loadOrders(1)"
                ${orderCurrentPage === 1 ? 'disabled' : ''}>«</button>
        <button ${btnStyle(false)} onclick="loadOrders(${orderCurrentPage - 1})"
                ${orderCurrentPage === 1 ? 'disabled' : ''}>‹</button>
        ${pages.map(p => `
          <button ${btnStyle(p === orderCurrentPage)}
                  onclick="loadOrders(${p})">${p}</button>`).join('')}
        <button ${btnStyle(false)} onclick="loadOrders(${orderCurrentPage + 1})"
                ${orderCurrentPage === totalPages ? 'disabled' : ''}>›</button>
        <button ${btnStyle(false)} onclick="loadOrders(${totalPages})"
                ${orderCurrentPage === totalPages ? 'disabled' : ''}>»</button>
      </div>`;
  }

  // ════════════════════════════════════════
  //  MODAL DETALHES DO PEDIDO
  // ════════════════════════════════════════
  async function openOrderModal(id) {
    closeModal();

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>📋 Pedido <span style="color:var(--primary)">#${id}</span></h2>
        <div id="order-detail-content">
          <div class="loader"></div>
        </div>
      </div>`;

    document.getElementById('modal-container').appendChild(modal);

    try {
      const o = await API.orders.adminDetail(id);

      const items = o.items || o.order_items || [];
      const addr  = o.shipping_address;
      const addrStr = addr
        ? (typeof addr === 'string'
            ? addr
            : `${addr.street || ''}, ${addr.city || ''} — ${addr.state || ''}`.trim().replace(/^,|,$/g, ''))
        : '—';

      document.getElementById('order-detail-content').innerHTML = `
        <div class="order-info-grid">
          <div class="order-info-item">
            <label>Cliente</label>
            <span>${getClientName(o)}</span>
          </div>
          <div class="order-info-item">
            <label>E-mail</label>
            <span>${o.user?.email || o.customer?.email || '—'}</span>
          </div>
          <div class="order-info-item">
            <label>Data do pedido</label>
            <span>${formatDate(o.created_at)}</span>
          </div>
          <div class="order-info-item">
            <label>Status atual</label>
            <span>${renderStatus(o.status)}</span>
          </div>
          <div class="order-info-item" style="grid-column:1/-1">
            <label>Endereço de entrega</label>
            <span>${addrStr}</span>
          </div>
        </div>

        <div class="order-items-title">Itens do pedido</div>
        <div class="order-items-list">
          ${items.length
            ? items.map(item => {
                const name     = item.product_name || item.product?.name || `Produto #${item.product}`;
                const qty      = item.quantity;
                const price    = item.unit_price ?? item.price ?? 0;
                const subtotal = parseFloat(price) * parseInt(qty);
                return `
                  <div class="order-item-row">
                    <span class="item-name">${name}</span>
                    <span class="item-qty">× ${qty}</span>
                    <span class="item-price">${formatPrice(subtotal)}</span>
                  </div>`;
              }).join('')
            : '<p class="text-muted" style="font-size:0.85rem">Nenhum item encontrado.</p>'}
        </div>

        <div class="order-total-row">
          <span>Total do pedido</span>
          <strong>${formatPrice(o.total)}</strong>
        </div>

        <div class="status-select-wrap">
          <div class="form-group">
            <label>Atualizar status</label>
            <select id="newStatus" class="form-control">
              <option value="pending"    ${o.status === 'pending'    ? 'selected' : ''}>⏳ Aguardando pagamento</option>
              <option value="paid"       ${o.status === 'paid'       ? 'selected' : ''}>💳 Pago</option>
              <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>⚙️ Em processamento</option>
              <option value="shipped"    ${o.status === 'shipped'    ? 'selected' : ''}>🚚 Enviado</option>
              <option value="delivered"  ${o.status === 'delivered'  ? 'selected' : ''}>✅ Entregue</option>
              <option value="cancelled"  ${o.status === 'cancelled'  ? 'selected' : ''}>❌ Cancelado</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="updateOrderStatus(${id})">
            💾 Salvar
          </button>
        </div>`;

    } catch (e) {
      console.error('[Detalhe Pedido]', e);
      document.getElementById('order-detail-content').innerHTML =
        `<p class="text-muted text-center" style="padding:20px">
          ❌ Erro ao carregar pedido: ${e?.detail || e?.message || ''}
        </p>`;
    }
  }

  // ════════════════════════════════════════
  //  ATUALIZAR STATUS
  // ════════════════════════════════════════
  async function updateOrderStatus(id) {
    const newStatus = document.getElementById('newStatus')?.value;
    if (!newStatus) return;

    try {
      await API.orders.updateStatus(id, { status: newStatus });
      showToast('✅ Status atualizado com sucesso!', 'success');
      closeModal();
      loadOrders(orderCurrentPage);
    } catch (e) {
      console.error('[Update Status]', e);
      showToast(e?.detail || 'Erro ao atualizar status', 'error');
    }
  }

  // ════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════
  loadOrders(1);
</script>
</body>
</html>
