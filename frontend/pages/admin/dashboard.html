<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Glins Store</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .admin-layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
    .admin-sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .admin-sidebar-title {
      font-family: var(--font-title);
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0 20px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .admin-nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      color: var(--text-light);
      font-size: 0.88rem;
      transition: var(--transition);
    }
    .admin-nav a:hover, .admin-nav a.active {
      background: rgba(201,162,39,0.08);
      color: var(--primary);
      border-right: 2px solid var(--primary);
    }
    .admin-main { padding: 32px; }
    .admin-header { margin-bottom: 32px; }
    .admin-header h1 { font-size: 1.8rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--primary-dark), transparent); }
    .stat-icon { font-size: 2rem; margin-bottom: 10px; }
    .stat-value { font-family: var(--font-title); font-size: 1.8rem; color: var(--primary); }
    .stat-label { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

    /* Tabela */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { font-family: var(--font-title); font-size: 0.78rem; color: var(--primary); letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }
    .data-table tr:hover td { background: rgba(201,162,39,0.04); }
    .data-table img { width: 44px; height: 44px; object-fit: cover; border-radius: var(--radius); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--bg-card); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal h2 { margin-bottom: 24px; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; }
    .modal-close:hover { color: var(--danger); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Tabs */
    .admin-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .admin-tab { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-family: var(--font-title); font-size: 0.82rem; letter-spacing: 0.08em; cursor: pointer; transition: var(--transition); margin-bottom: -1px; }
    .admin-tab:hover  { color: var(--text-light); }
    .admin-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } .admin-sidebar { height: auto; position: static; } }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="modal-container"></div>

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-title">👑 Admin Panel</div>
    <nav class="admin-nav">
      <a href="#" class="active" onclick="showSection('dashboard', this)">📊 Dashboard</a>
      <a href="#" onclick="showSection('products', this)">📦 Produtos</a>
      <a href="#" onclick="showSection('categories', this)">📂 Categorias</a>
      <a href="#" onclick="showSection('orders', this)">📋 Pedidos</a>
      <a href="/index.html" style="margin-top:auto; color:var(--text-muted)">← Voltar à Loja</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="admin-main">

    <!-- Dashboard -->
    <section id="section-dashboard">
      <div class="admin-header">
        <h1>📊 Dashboard</h1>
        <p class="text-muted">Visão geral da Glins Store</p>
      </div>
      <div class="stats-grid" id="stats-grid">
        <div class="loader"></div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:16px">📋 Últimos Pedidos</h3>
        <div id="recent-orders"><div class="loader"></div></div>
      </div>
    </section>

    <!-- Produtos -->
    <section id="section-products" class="hidden">
      <div class="admin-header flex-between">
        <div><h1>📦 Produtos</h1><p class="text-muted">Gerencie o catálogo</p></div>
        <button class="btn btn-primary" onclick="openProductModal()">+ Novo Produto</button>
      </div>
      <div class="card">
        <table class="data-table">
          <thead>
            <tr>
              <th>Imagem</th><th>Nome</th><th>Categoria</th>
              <th>Preço</th><th>Estoque</th><th>Status</th><th>Ações</th>
            </tr>
          </thead>
          <tbody id="products-table"><tr><td colspan="7" class="text-center"><div class="loader"></div></td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- Categorias -->
    <section id="section-categories" class="hidden">
      <div class="admin-header flex-between">
        <div><h1>📂 Categorias</h1></div>
        <button class="btn btn-primary" onclick="openCategoryModal()">+ Nova Categoria</button>
      </div>
      <div class="card">
        <table class="data-table">
          <thead><tr><th>Ícone</th><th>Nome</th><th>Slug</th><th>Produtos</th><th>Ações</th></tr></thead>
          <tbody id="categories-table"><tr><td colspan="5" class="text-center"><div class="loader"></div></td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- Pedidos -->
    <section id="section-orders" class="hidden">
      <div class="admin-header flex-between">
        <div><h1>📋 Pedidos</h1></div>
        <select class="form-control" id="orderStatusFilter" onchange="loadOrders()" style="width:auto">
          <option value="">Todos os status</option>
          <option value="pending">⏳ Aguardando</option>
          <option value="paid">✅ Pago</option>
          <option value="preparing">🔨 Preparando</option>
          <option value="shipped">🚚 Enviado</option>
          <option value="delivered">📦 Entregue</option>
          <option value="cancelled">❌ Cancelado</option>
        </select>
      </div>
      <div class="card">
        <table class="data-table">
          <thead><tr><th>#</th><th>Cliente</th><th>Total</th><th>Status</th><th>Data</th><th>Ações</th></tr></thead>
          <tbody id="orders-table"><tr><td colspan="6" class="text-center"><div class="loader"></div></td></tr></tbody>
        </table>
      </div>
    </section>

  </main>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script>
  if (!requireAdmin()) {}

  let categories = [];

  // ── Navegação ──────────────────────────
  function showSection(name, el) {
    document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('.admin-nav a').forEach(a => a.classList.remove('active'));
    document.getElementById(`section-${name}`).classList.remove('hidden');
    el?.classList.add('active');

    if (name === 'dashboard')  loadDashboard();
    if (name === 'products')   loadProducts();
    if (name === 'categories') loadCategories();
    if (name === 'orders')     loadOrders();
  }

  // ── Dashboard ──────────────────────────
  async function loadDashboard() {
    try {
      const [products, orders, cats] = await Promise.all([
        API.products.adminList(),
        API.orders.adminList(),
        API.categories.list()
      ]);

      const totalRevenue = orders
        .filter(o => o.status !== 'cancelled')
        .reduce((s, o) => s + parseFloat(o.total), 0);

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${products.length}</div><div class="stat-label">Produtos cadastrados</div></div>
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value">${orders.length}</div><div class="stat-label">Pedidos totais</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">${formatPrice(totalRevenue)}</div><div class="stat-label">Receita total</div></div>
        <div class="stat-card"><div class="stat-icon">📂</div><div class="stat-value">${cats.length}</div><div class="stat-label">Categorias</div></div>
      `;

      const recent = orders.slice(0, 5);
      document.getElementById('recent-orders').innerHTML = recent.length
        ? `<table class="data-table">
            <thead><tr><th>#</th><th>Cliente</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>${recent.map(o => `
              <tr>
                <td>#${o.id}</td>
                <td>${o.user?.name || '—'}</td>
                <td>${formatPrice(o.total)}</td>
                <td>${statusBadge(o.status)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`
        : '<p class="text-muted">Nenhum pedido ainda.</p>';
    } catch (_) {}
  }

  // ── Products ───────────────────────────
  async function loadProducts() {
    const tb = document.getElementById('products-table');
    try {
      const [products, cats] = await Promise.all([API.products.adminList(), API.categories.list()]);
      categories = cats;
      tb.innerHTML = products.map(p => `
        <tr>
          <td>${p.image_url ? `<img src="${p.image_url}" alt="${p.name}"/>` : '<div style="width:44px;height:44px;background:var(--bg-surface);border-radius:var(--radius);display:flex;align-items:center;justify-content:center">🏺</div>'}</td>
          <td><strong>${p.name}</strong></td>
          <td>${p.category_name || '—'}</td>
          <td>${formatPrice(p.price)}</td>
          <td>
            <span class="${p.stock > 0 ? 'badge badge-success' : 'badge badge-danger'}">${p.stock}</span>
          </td>
          <td>${p.is_active ? '<span class="badge badge-success">Ativo</span>' : '<span class="badge badge-muted">Inativo</span>'}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="openProductModal(${p.id})">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️</button>
          </td>
        </tr>`).join('');
    } catch (_) { tb.innerHTML = '<tr><td colspan="7" class="text-muted text-center">Erro ao carregar</td></tr>'; }
  }

  async function deleteProduct(id) {
    if (!confirm('Deletar este produto?')) return;
    try {
      await API.products.delete(id);
      showToast('Produto deletado', 'success');
      loadProducts();
    } catch (_) { showToast('Erro ao deletar', 'error'); }
  }

  function openProductModal(id = null) {
    const isEdit = id !== null;
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'product-modal';
    modal.innerHTML = `
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>${isEdit ? '✏️ Editar Produto' : '📦 Novo Produto'}</h2>
        <form id="productForm">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" id="pName" class="form-control" required/>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Preço (R$)</label>
              <input type="number" id="pPrice" class="form-control" step="0.01" required/>
            </div>
            <div class="form-group">
              <label>Estoque</label>
              <input type="number" id="pStock" class="form-control" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <select id="pCategory" class="form-control">
              <option value="">Sem categoria</option>
              ${categories.map(c => `<option value="${c.id}">${c.icon || ''} ${c.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Descrição</label>
            <textarea id="pDesc" class="form-control" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Imagem do produto</label>
            <input type="file" id="pImage" class="form-control" accept="image/*"/>
          </div>
          <div class="flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary" id="saveProductBtn">
              ${isEdit ? '💾 Salvar' : '➕ Criar'}
            </button>
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          </div>
        </form>
      </div>`;

    document.getElementById('modal-container').appendChild(modal);

    if (isEdit) {
      API.products.detail(id).then(p => {
        document.getElementById('pName').value     = p.name;
        document.getElementById('pPrice').value    = p.price;
        document.getElementById('pStock').value    = p.stock;
        document.getElementById('pDesc').value     = p.description;
        document.getElementById('pCategory').value = p.category || '';
      });
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveProductBtn');
      btn.disabled = true;

      const data = {
        name:        document.getElementById('pName').value,
        price:       document.getElementById('pPrice').value,
        stock:       document.getElementById('pStock').value,
        description: document.getElementById('pDesc').value,
        category:    document.getElementById('pCategory').value || null,
        is_active:   true,
      };

      try {
        let product;
        if (isEdit) {
          product = await API.products.update(id, data);
        } else {
          product = await API.products.create(data);
        }

        // Upload de imagem se selecionada
        const imageFile = document.getElementById('pImage').files[0];
        if (imageFile) {
          await API.products.uploadImage(product.id, imageFile);
        }

        showToast(isEdit ? 'Produto atualizado! ✅' : 'Produto criado! ✅', 'success');
        closeModal();
        loadProducts();
      } catch (err) {
        showToast(err.name?.[0] || 'Erro ao salvar', 'error');
        btn.disabled = false;
      }
    });
  }

  // ── Categories ─────────────────────────
  async function loadCategories() {
    const tb = document.getElementById('categories-table');
    try {
      const cats = await API.categories.list();
      categories = cats;
      tb.innerHTML = cats.map(c => `
        <tr>
          <td style="font-size:1.5rem">${c.icon || '🏷️'}</td>
          <td><strong>${c.name}</strong></td>
          <td><code style="color:var(--text-muted);font-size:0.82rem">${c.slug}</code></td>
          <td><span class="badge badge-gold">${c.product_count}</span></td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="openCategoryModal(${c.id})">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">🗑️</button>
          </td>
        </tr>`).join('');
    } catch (_) { tb.innerHTML = '<tr><td colspan="5" class="text-muted text-center">Erro</td></tr>'; }
  }

  function openCategoryModal(id = null) {
    const isEdit = id !== null;
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'cat-modal';
    modal.innerHTML = `
      <div class="modal" style="max-width:400px">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>${isEdit ? '✏️ Editar Categoria' : '📂 Nova Categoria'}</h2>
        <form id="categoryForm">
          <div class="form-group"><label>Nome</label><input type="text" id="cName" class="form-control" required/></div>
          <div class="form-group"><label>Slug</label><input type="text" id="cSlug" class="form-control" required/></div>
          <div class="form-group"><label>Ícone (emoji)</label><input type="text" id="cIcon" class="form-control" placeholder="⚔️"/></div>
          <div class="flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary">${isEdit ? '💾 Salvar' : '➕ Criar'}</button>
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          </div>
        </form>
      </div>`;
    document.getElementById('modal-container').appendChild(modal);

    // Auto-gerar slug
    document.getElementById('cName').addEventListener('input', (e) => {
      if (!isEdit) {
        document.getElementById('cSlug').value = e.target.value
          .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      }
    });

    if (isEdit) {
      const cat = categories.find(c => c.id === id);
      if (cat) {
        document.getElementById('cName').value = cat.name;
        document.getElementById('cSlug').value = cat.slug;
        document.getElementById('cIcon').value = cat.icon || '';
      }
    }

    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = { name: document.getElementById('cName').value, slug: document.getElementById('cSlug').value, icon: document.getElementById('cIcon').value };
      try {
        if (isEdit) await API.categories.update(id, data);
        else await API.categories.create(data);
        showToast(isEdit ? 'Categoria atualizada! ✅' : 'Categoria criada! ✅', 'success');
        closeModal();
        loadCategories();
      } catch (err) {
        showToast(err.name?.[0] || err.slug?.[0] || 'Erro ao salvar', 'error');
      }
    });
  }

  async function deleteCategory(id) {
    if (!confirm('Deletar esta categoria?')) return;
    try {
      await API.categories.delete(id);
      showToast('Categoria deletada', 'success');
      loadCategories();
    } catch (_) { showToast('Erro ao deletar', 'error'); }
  }

  // ── Orders ─────────────────────────────
  async function loadOrders() {
    const tb = document.getElementById('orders-table');
    const filter = document.getElementById('orderStatusFilter')?.value;
    try {
      const orders = await API.orders.adminList(filter ? { status: filter } : {});
      tb.innerHTML = orders.map(o => `
        <tr>
          <td><strong>#${o.id}</strong></td>
          <td>${o.user?.name || o.user?.email || '—'}</td>
          <td>${formatPrice(o.total)}</td>
          <td>${statusBadge(o.status)}</td>
          <td>${formatDate(o.created_at)}</td>
          <td><button class="btn btn-outline btn-sm" onclick="openOrderModal(${o.id})">✏️ Atualizar</button></td>
        </tr>`).join('');
    } catch (_) { tb.innerHTML = '<tr><td colspan="6" class="text-muted text-center">Erro</td></tr>'; }
  }

  function openOrderModal(id) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal" style="max-width:400px">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>📋 Pedido #${id}</h2>
        <form id="orderForm">
          <div class="form-group">
            <label>Status</label>
            <select id="oStatus" class="form-control">
              <option value="pending">⏳ Aguardando</option>
              <option value="paid">✅ Pago</option>
              <option value="preparing">🔨 Preparando</option>
              <option value="shipped">🚚 Enviado</option>
              <option value="delivered">📦 Entregue</option>
              <option value="cancelled">❌ Cancelado</option>
            </select>
          </div>
          <div class="form-group">
            <label>Código de Rastreio</label>
            <input type="text" id="oTracking" class="form-control" placeholder="AA000000000BR"/>
          </div>
          <div class="flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary">💾 Salvar</button>
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          </div>
        </form>
      </div>`;
    document.getElementById('modal-container').appendChild(modal);

    API.orders.detail(id).catch(() => {}).then(o => {
      if (!o) return;
      document.getElementById('oStatus').value   = o.status;
      document.getElementById('oTracking').value = o.tracking_code || '';
    });

    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await API.orders.adminUpdate(id, {
          status:        document.getElementById('oStatus').value,
          tracking_code: document.getElementById('oTracking').value,
        });
        showToast('Pedido atualizado! ✅', 'success');
        closeModal();
        loadOrders();
      } catch (_) { showToast('Erro ao atualizar', 'error'); }
    });
  }

  function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
  }

  // Fechar modal clicando fora
  document.getElementById('modal-container').addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay')) closeModal();
  });

  // Init
  loadDashboard();
</script>
</body>
</html>
