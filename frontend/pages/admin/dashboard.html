<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Glins Store</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .admin-sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      font-family: var(--font-title);
      font-size: 1rem;
      color: var(--primary);
      letter-spacing: 0.1em;
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .sidebar-brand span {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .admin-nav { flex: 1; }
    .admin-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: var(--text-light);
      font-size: 0.88rem;
      transition: var(--transition);
      border-right: 2px solid transparent;
    }
    .admin-nav a:hover,
    .admin-nav a.active {
      background: rgba(201,162,39,0.08);
      color: var(--primary);
      border-right-color: var(--primary);
    }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .sidebar-footer a {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-footer a:hover { color: var(--primary); }

    .admin-main {
      padding: 32px;
      background: var(--bg-surface);
    }
    .admin-header { margin-bottom: 28px; }
    .admin-header h1 { font-size: 1.6rem; margin-bottom: 4px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .stat-card:hover {
      border-color: var(--primary-dark);
      transform: translateY(-2px);
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary-dark), transparent);
    }
    .stat-icon  { font-size: 1.8rem; margin-bottom: 10px; }
    .stat-value { font-family: var(--font-title); font-size: 1.6rem; color: var(--primary); }
    .stat-label { color: var(--text-muted); font-size: 0.82rem; margin-top: 4px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-family: var(--font-title);
      font-size: 0.75rem;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(201,162,39,0.03); }

    .stock-low  { color: #e67e22; font-weight: 600; }
    .stock-zero { color: var(--danger); font-weight: 600; }

    .debug-box {
      background: #1a0a0a;
      border: 1px solid #c0392b;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      color: #e74c3c;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar {
        height: auto;
        position: static;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 12px;
      }
      .sidebar-brand { border-bottom: none; padding-bottom: 0; }
      .admin-nav { display: flex; flex-wrap: wrap; }
      .admin-nav a {
        padding: 8px 12px;
        border-right: none;
        border-bottom: 2px solid transparent;
      }
      .admin-nav a.active {
        border-right: none;
        border-bottom-color: var(--primary);
      }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      👑 GLINS STORE
      <span>Painel Administrativo</span>
    </div>
    <nav class="admin-nav">
      <a href="/pages/admin/dashboard.html"  class="active">📊 Dashboard</a>
      <a href="/pages/admin/products.html">📦 Produtos</a>
      <a href="/pages/admin/categories.html">📂 Categorias</a>
      <a href="/pages/admin/orders.html">📋 Pedidos</a>
      <a href="/pages/admin/customers.html">👥 Clientes</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/index.html">← Voltar à Loja</a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>📊 Dashboard</h1>
      <p class="text-muted">Visão geral da Glins Store</p>
    </div>

    <div id="dashboard-error" style="display:none"></div>

    <div class="stats-grid" id="stats-grid">
      <div class="loader"></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3 style="margin-bottom:16px; font-size:1rem">📋 Últimos Pedidos</h3>
        <div id="recent-orders"><div class="loader"></div></div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:16px; font-size:1rem">📦 Estoque Crítico</h3>
        <div id="low-stock"><div class="loader"></div></div>
      </div>
    </div>
  </main>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script>
  if (!requireAdmin()) {}

  // ════════════════════════════════════════
  //  HELPERS
  // ════════════════════════════════════════
  function toArray(response) {
    if (!response) return [];
    if (Array.isArray(response)) return response;
    if (Array.isArray(response.results)) return response.results;
    const keys = Object.keys(response);
    for (const k of keys) {
      if (Array.isArray(response[k])) return response[k];
    }
    return [];
  }

  function getClientName(order) {
    if (order.user?.name)       return order.user.name;
    if (order.user?.first_name) return `${order.user.first_name} ${order.user.last_name || ''}`.trim();
    if (order.user?.username)   return order.user.username;
    if (order.user?.email)      return order.user.email;
    if (order.customer_name)    return order.customer_name;
    if (order.customer?.name)   return order.customer.name;
    if (order.shipping_address) {
      if (typeof order.shipping_address === 'object' && order.shipping_address.name)
        return order.shipping_address.name;
    }
    return `#${order.id}`;
  }

  // ════════════════════════════════════════
  //  BUSCA TODOS OS PRODUTOS
  // ════════════════════════════════════════
  async function fetchAllProducts() {
    let all = [];
    let page = 1;
    while (true) {
      const res   = await API.products.adminList({ page, page_size: 100 });
      const items = Array.isArray(res) ? res : (res?.results ?? []);
      all         = all.concat(items);
      const hasNext = !Array.isArray(res) && !!res?.next;
      if (!hasNext || items.length === 0) break;
      page++;
    }
    return all;
  }

  // ════════════════════════════════════════
  //  DASHBOARD
  // ════════════════════════════════════════
  async function loadDashboard() {
    document.getElementById('stats-grid').innerHTML       = '<div class="loader"></div>';
    document.getElementById('recent-orders').innerHTML    = '<div class="loader"></div>';
    document.getElementById('low-stock').innerHTML        = '<div class="loader"></div>';
    document.getElementById('dashboard-error').style.display = 'none';

    try {
      // ✅ Incluído API.users.list() no Promise.all
      const [products, rawOrders, rawCats, rawUsers] = await Promise.all([
        fetchAllProducts(),
        API.orders.adminList(),
        API.categories.list(),
        API.users.list(),
      ]);

      const orders = toArray(rawOrders);
      const cats   = toArray(rawCats);
      const users  = toArray(rawUsers);  // ✅ clientes

      const totalRevenue   = orders
        .filter(o => o.status !== 'cancelled')
        .reduce((s, o) => s + parseFloat(o.total || 0), 0);
      const pendingOrders  = orders.filter(o => o.status === 'pending').length;
      const activeProducts = products.filter(p => p.is_active !== false).length;
      const totalCustomers = users.length;  // ✅ contagem

      document.getElementById('stats-grid').innerHTML = `
        <a class="stat-card" href="/pages/admin/products.html">
          <div class="stat-icon">📦</div>
          <div class="stat-value">${activeProducts}</div>
          <div class="stat-label">Produtos ativos</div>
        </a>
        <a class="stat-card" href="/pages/admin/orders.html">
          <div class="stat-icon">📋</div>
          <div class="stat-value">${orders.length}</div>
          <div class="stat-label">Pedidos totais</div>
        </a>
        <a class="stat-card" href="/pages/admin/orders.html">
          <div class="stat-icon">⏳</div>
          <div class="stat-value">${pendingOrders}</div>
          <div class="stat-label">Aguardando pagamento</div>
        </a>
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div class="stat-value">${formatPrice(totalRevenue)}</div>
          <div class="stat-label">Receita total</div>
        </div>
        <a class="stat-card" href="/pages/admin/categories.html">
          <div class="stat-icon">📂</div>
          <div class="stat-value">${cats.length}</div>
          <div class="stat-label">Categorias</div>
        </a>
        <a class="stat-card" href="/pages/admin/customers.html">
          <div class="stat-icon">👥</div>
          <div class="stat-value">${totalCustomers}</div>
          <div class="stat-label">Clientes cadastrados</div>
        </a>`;

      const recent = orders.slice(0, 6);
      document.getElementById('recent-orders').innerHTML = recent.length
        ? `<div class="table-wrapper">
            <table class="data-table">
              <thead>
                <tr><th>#</th><th>Cliente</th><th>Total</th><th>Status</th></tr>
              </thead>
              <tbody>
                ${recent.map(o => `
                  <tr>
                    <td><strong>#${o.id}</strong></td>
                    <td>${getClientName(o)}</td>
                    <td>${formatPrice(o.total)}</td>
                    <td>${statusBadge(o.status)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`
        : '<p class="text-muted text-center" style="padding:20px">Nenhum pedido ainda.</p>';

      const lowStock = products
        .filter(p => (p.stock ?? p.quantity ?? 0) <= 5)
        .sort((a, b) => (a.stock ?? a.quantity ?? 0) - (b.stock ?? b.quantity ?? 0))
        .slice(0, 8);

      document.getElementById('low-stock').innerHTML = lowStock.length
        ? `<div class="table-wrapper">
            <table class="data-table">
              <thead><tr><th>Produto</th><th>Estoque</th></tr></thead>
              <tbody>
                ${lowStock.map(p => {
                  const qty = p.stock ?? p.quantity ?? 0;
                  return `<tr>
                    <td>${p.name}</td>
                    <td>
                      <span class="${qty === 0 ? 'stock-zero' : 'stock-low'}">
                        ${qty === 0 ? '❌ Esgotado' : `⚠️ ${qty} un.`}
                      </span>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`
        : '<p class="text-muted text-center" style="padding:20px">✅ Estoque saudável!</p>';

    } catch (e) {
      console.error('[Dashboard] ERRO:', e);
      const errBox = document.getElementById('dashboard-error');
      errBox.style.display  = 'block';
      errBox.className      = 'debug-box';
      errBox.textContent    = `❌ Erro ao carregar dashboard:\n${JSON.stringify(e, null, 2)}\n\n${e?.message || ''}`;
      document.getElementById('stats-grid').innerHTML    = '';
      document.getElementById('recent-orders').innerHTML = '<p class="text-muted text-center" style="padding:20px">Erro ao carregar.</p>';
      document.getElementById('low-stock').innerHTML     = '<p class="text-muted text-center" style="padding:20px">Erro ao carregar.</p>';
    }
  }

  loadDashboard();
</script>
</body>
</html>
