<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clientes — Glins Store Admin</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .admin-sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      font-family: var(--font-title);
      font-size: 1rem;
      color: var(--primary);
      letter-spacing: 0.1em;
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .sidebar-brand span {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .admin-nav { flex: 1; }
    .admin-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: var(--text-light);
      font-size: 0.88rem;
      transition: var(--transition);
      border-right: 2px solid transparent;
    }
    .admin-nav a:hover,
    .admin-nav a.active {
      background: rgba(201,162,39,0.08);
      color: var(--primary);
      border-right-color: var(--primary);
    }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .sidebar-footer a {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-footer a:hover { color: var(--primary); }

    .admin-main { padding: 32px; background: var(--bg-surface); }
    .admin-header { margin-bottom: 28px; }
    .admin-header h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary-dark), transparent);
    }
    .stat-card .stat-value {
      font-family: var(--font-title);
      font-size: 1.6rem;
      color: var(--primary);
    }
    .stat-card .stat-label {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-top: 4px;
    }

    /* Filtros */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-bar input,
    .filter-bar select { flex: 1; min-width: 140px; }

    /* Tabela */
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-family: var(--font-title);
      font-size: 0.75rem;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(201,162,39,0.03); }

    /* Avatar */
    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #000;
      flex-shrink: 0;
    }
    .client-info { display: flex; align-items: center; gap: 12px; }
    .client-name  { font-weight: 600; }
    .client-email { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    /* Paginação */
    #customers-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal h2 { margin-bottom: 24px; font-size: 1.2rem; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      color: var(--text-muted); font-size: 1.4rem;
      cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--danger); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar {
        height: auto; position: static;
        flex-direction: row; flex-wrap: wrap; padding: 12px;
      }
      .sidebar-brand { border-bottom: none; padding-bottom: 0; }
      .admin-nav { display: flex; flex-wrap: wrap; }
      .admin-nav a {
        padding: 8px 12px;
        border-right: none;
        border-bottom: 2px solid transparent;
      }
      .admin-nav a.active {
        border-right: none;
        border-bottom-color: var(--primary);
      }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="modal-container"></div>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      👑 GLINS STORE
      <span>Painel Administrativo</span>
    </div>
    <nav class="admin-nav">
      <a href="/pages/admin/dashboard.html">📊 Dashboard</a>
      <a href="/pages/admin/products.html">📦 Produtos</a>
      <a href="/pages/admin/categories.html">📂 Categorias</a>
      <a href="/pages/admin/orders.html">📋 Pedidos</a>
      <a href="/pages/admin/customers.html" class="active">👥 Clientes</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/index.html">← Voltar à Loja</a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-header flex-between">
      <div>
        <h1>👥 Clientes</h1>
        <p class="text-muted">Gerencie todos os clientes cadastrados</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Total de clientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statActive">—</div>
        <div class="stat-label">Ativos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statAdmin">—</div>
        <div class="stat-label">Admins</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statNew">—</div>
        <div class="stat-label">Novos (30d)</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filter-bar">
      <input type="text" class="form-control" id="searchInput"
             placeholder="🔍 Buscar por nome, e-mail ou telefone..."
             oninput="debounceSearch()"/>
      <select class="form-control" id="filterRole" onchange="applyFilters()">
        <option value="user">Apenas clientes</option>
        <option value="">Todos os perfis</option>
        <option value="admin">Apenas admins</option>
      </select>
      <select class="form-control" id="filterStatus" onchange="applyFilters()">
        <option value="">Todos os status</option>
        <option value="active">Ativos</option>
        <option value="inactive">Inativos</option>
      </select>
    </div>

    <!-- Tabela -->
    <div class="card">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Telefone</th>
              <th>Perfil</th>
              <th>Status</th>
              <th>Cadastro</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6" class="text-center"><div class="loader"></div></td></tr>
          </tbody>
        </table>
      </div>
      <div id="customers-pagination"></div>
    </div>
  </main>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script>
  if (!requireAdmin()) {}

  // ════════════════════════════════════════
  //  ESTADO
  // ════════════════════════════════════════
  let allCustomers    = [];
  let filtered        = [];
  let currentPage     = 1;
  const PER_PAGE      = 20;
  let searchDebounce  = null;

  // ════════════════════════════════════════
  //  MODAL
  // ════════════════════════════════════════
  function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
  }
  document.getElementById('modal-container').addEventListener('click', e => {
    if (e.target.classList.contains('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // ════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════
  loadCustomers();

  function debounceSearch() {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      currentPage = 1;
      applyFilters();
    }, 300);
  }

  // ════════════════════════════════════════
  //  CARREGAR
  // ════════════════════════════════════════
  async function loadCustomers() {
    try {
      const res    = await API.users.list();
      allCustomers = res.results ?? res ?? [];
      updateStats();
      applyFilters();
    } catch (e) {
      console.error(e);
      document.getElementById('tableBody').innerHTML =
        `<tr><td colspan="6" class="text-muted text-center" style="padding:20px">
          ❌ Erro ao carregar clientes. Verifique a API.
        </td></tr>`;
    }
  }

  // ════════════════════════════════════════
  //  STATS
  // ════════════════════════════════════════
  function updateStats() {
    const total  = allCustomers.length;
    const active = allCustomers.filter(u => u.is_active !== false).length;
    const admins = allCustomers.filter(u => u.is_admin || u.is_staff).length;
    const ago30  = Date.now() - 30 * 24 * 60 * 60 * 1000;
    const newOnes = allCustomers.filter(u => {
      const d = u.created_at ?? u.date_joined;
      return d && new Date(d).getTime() > ago30;
    }).length;

    document.getElementById('statTotal').textContent  = total;
    document.getElementById('statActive').textContent = active;
    document.getElementById('statAdmin').textContent  = admins;
    document.getElementById('statNew').textContent    = newOnes;
  }

  // ════════════════════════════════════════
  //  FILTROS
  // ════════════════════════════════════════
  function applyFilters() {
    const q      = document.getElementById('searchInput').value.trim().toLowerCase();
    const role   = document.getElementById('filterRole').value;
    const status = document.getElementById('filterStatus').value;

    filtered = allCustomers.filter(u => {
      const name  = getFullName(u).toLowerCase();
      const email = (u.email ?? '').toLowerCase();
      const phone = (u.phone ?? '').toLowerCase();

      if (q && !name.includes(q) && !email.includes(q) && !phone.includes(q)) return false;
      if (role === 'admin' && !(u.is_admin || u.is_staff))  return false;
      if (role === 'user'  &&  (u.is_admin || u.is_staff))  return false;
      if (status === 'active'   && u.is_active === false)   return false;
      if (status === 'inactive' && u.is_active !== false)   return false;

      return true;
    });

    currentPage = 1;
    renderTable();
  }

  // ════════════════════════════════════════
  //  TABELA
  // ════════════════════════════════════════
  function renderTable() {
    const tbody = document.getElementById('tableBody');
    const pg    = document.getElementById('customers-pagination');

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-muted text-center" style="padding:20px">
        Nenhum cliente encontrado.
      </td></tr>`;
      pg.innerHTML = '';
      return;
    }

    const total = filtered.length;
    const pages = Math.ceil(total / PER_PAGE);
    const start = (currentPage - 1) * PER_PAGE;
    const slice = filtered.slice(start, start + PER_PAGE);

    tbody.innerHTML = slice.map(u => {
      const name    = getFullName(u);
      const email   = u.email ?? '—';
      const phone   = u.phone || '—';
      const isAdmin = u.is_admin || u.is_staff;
      const active  = u.is_active !== false;
      const joined  = formatDate(u.created_at ?? u.date_joined);

      return `
        <tr>
          <td>
            <div class="client-info">
              <div class="avatar">${getInitials(name)}</div>
              <div>
                <div class="client-name">${name}</div>
                <div class="client-email">${email}</div>
              </div>
            </div>
          </td>
          <td>${phone}</td>
          <td>
            ${isAdmin
              ? '<span class="badge badge-gold">⭐ Admin</span>'
              : '<span class="text-muted" style="font-size:0.82rem">Cliente</span>'}
          </td>
          <td>
            ${active
              ? '<span class="badge badge-success">● Ativo</span>'
              : '<span class="badge badge-muted">● Inativo</span>'}
          </td>
          <td class="text-muted" style="font-size:0.82rem">${joined}</td>
          <td>
            <button class="btn btn-outline btn-sm"
                    onclick="openEdit(${u.id})" title="Editar">✏️ Editar</button>
          </td>
        </tr>`;
    }).join('');

    // Paginação
    if (pages <= 1) {
      pg.innerHTML = `<span class="text-muted" style="font-size:0.82rem">
        ${total} cliente${total !== 1 ? 's' : ''} encontrado${total !== 1 ? 's' : ''}
      </span>`;
      return;
    }

    const end   = Math.min(start + PER_PAGE, total);
    const delta = 2;
    const pageNums = [];
    for (let i = Math.max(1, currentPage - delta); i <= Math.min(pages, currentPage + delta); i++) {
      pageNums.push(i);
    }

    const btnStyle = (active) =>
      `style="padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:0.82rem;
              border:1px solid ${active ? 'var(--primary)' : 'var(--border)'};
              background:${active ? 'var(--primary)' : 'transparent'};
              color:${active ? '#000' : 'var(--text-light)'}"`;

    pg.innerHTML = `
      <span class="text-muted" style="font-size:0.82rem">
        Exibindo <strong>${start + 1}–${end}</strong> de <strong>${total}</strong> clientes
      </span>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button ${btnStyle(false)} onclick="goPage(1)"
                ${currentPage === 1 ? 'disabled' : ''}>«</button>
        <button ${btnStyle(false)} onclick="goPage(${currentPage - 1})"
                ${currentPage === 1 ? 'disabled' : ''}>‹</button>
        ${pageNums.map(p => `
          <button ${btnStyle(p === currentPage)}
                  onclick="goPage(${p})">${p}</button>`).join('')}
        <button ${btnStyle(false)} onclick="goPage(${currentPage + 1})"
                ${currentPage === pages ? 'disabled' : ''}>›</button>
        <button ${btnStyle(false)} onclick="goPage(${pages})"
                ${currentPage === pages ? 'disabled' : ''}>»</button>
      </div>`;
  }

  function goPage(p) {
    currentPage = p;
    renderTable();
  }

  // ════════════════════════════════════════
  //  MODAL EDIÇÃO
  // ════════════════════════════════════════
  function openEdit(id) {
    const u = allCustomers.find(c => c.id === id);
    if (!u) return;

    const name = getFullName(u);
    closeModal();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>✏️ Editar Cliente</h2>

        <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;">
          <div class="avatar" style="width:48px;height:48px;font-size:18px;">${getInitials(name)}</div>
          <div>
            <div style="font-weight:700">${name}</div>
            <div style="font-size:0.78rem;color:var(--text-muted)">${u.email ?? '—'}</div>
          </div>
        </div>

        <form id="editForm" onsubmit="submitEdit(event, ${id})">
          <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="editName" class="form-control"
                   value="${u.name ?? ''}" placeholder="Nome completo"/>
          </div>
          <div class="form-group" style="margin-top:14px">
            <label>E-mail</label>
            <input type="email" id="editEmail" class="form-control"
                   value="${u.email ?? ''}" disabled
                   style="opacity:.5;cursor:not-allowed"
                   title="E-mail não pode ser alterado"/>
          </div>
          <div class="grid-2" style="margin-top:14px">
            <div class="form-group">
              <label>Telefone</label>
              <input type="text" id="editPhone" class="form-control"
                     value="${u.phone ?? ''}" placeholder="(xx) xxxxx-xxxx"/>
            </div>
            <div class="form-group">
              <label>Perfil</label>
              <select id="editIsAdmin" class="form-control">
                <option value="false" ${!(u.is_admin || u.is_staff) ? 'selected' : ''}>Cliente</option>
                <option value="true"  ${ (u.is_admin || u.is_staff) ? 'selected' : ''}>Admin</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-top:14px">
            <label>Status</label>
            <select id="editIsActive" class="form-control">
              <option value="true"  ${u.is_active !== false ? 'selected' : ''}>Ativo</option>
              <option value="false" ${u.is_active === false ? 'selected' : ''}>Inativo</option>
            </select>
          </div>
          <div class="flex gap-2 mt-2" style="margin-top:24px">
            <button type="submit" class="btn btn-primary" id="btnSave">💾 Salvar alterações</button>
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          </div>
        </form>
      </div>`;

    document.getElementById('modal-container').appendChild(overlay);
  }

  async function submitEdit(e, id) {
    e.preventDefault();
    const btn = document.getElementById('btnSave');
    btn.disabled    = true;
    btn.textContent = '⏳ Salvando...';

    const payload = {
      name:      document.getElementById('editName').value.trim(),
      phone:     document.getElementById('editPhone').value.trim(),
      is_admin:  document.getElementById('editIsAdmin').value === 'true',
      is_active: document.getElementById('editIsActive').value === 'true',
    };

    try {
      const updated = await API.users.update(id, payload);
      const idx = allCustomers.findIndex(c => c.id === id);
      if (idx !== -1) allCustomers[idx] = { ...allCustomers[idx], ...updated ?? payload };
      updateStats();
      applyFilters();
      closeModal();
      showToast('✅ Cliente atualizado com sucesso!', 'success');
    } catch (err) {
      console.error(err);
      showToast('❌ Erro ao salvar. Tente novamente.', 'error');
      btn.disabled    = false;
      btn.textContent = '💾 Salvar alterações';
    }
  }

  // ════════════════════════════════════════
  //  HELPERS
  // ════════════════════════════════════════
  function getFullName(u) {
    return u.name || u.email?.split('@')[0] || 'Sem nome';
  }

  function getInitials(name) {
    const parts = name.trim().split(' ').filter(Boolean);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric'
    });
  }
</script>
</body>
</html>
