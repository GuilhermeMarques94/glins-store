<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — Glins Store</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px 40px;
    }
    .auth-box { width: 100%; max-width: 440px; }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header h1 { font-size: 1.8rem; }
    .auth-header p  { color: var(--text-muted); margin-top: 8px; }
    .auth-footer { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>
<div id="toast-container"></div>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <h1>⚔️ Entrar no Reino</h1>
      <p>Acesse sua conta na Glins Store</p>
    </div>

    <div class="card">
      <form id="loginForm">
        <div class="form-group">
          <label>📧 E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required/>
        </div>
        <div class="form-group">
          <label>🔑 Senha</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
          🗡️ Entrar
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Não tem conta? <a href="/pages/register.html">Cadastre-se aqui →</a>
    </div>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/navbar.js"></script>
<script>
  if (Auth.isLogged()) window.location.href = '/index.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
      const data = await API.auth.login({
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      Auth.save(data);
      showToast('Bem-vindo de volta! ⚔️', 'success');
      setTimeout(() => window.location.href = '/index.html', 800);
    } catch (err) {
      showToast(err.error || 'Credenciais inválidas', 'error');
      btn.disabled = false;
      btn.textContent = '🗡️ Entrar';
    }
  });
</script>
</body>
</html>
