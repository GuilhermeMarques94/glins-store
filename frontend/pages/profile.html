<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧙‍♂️</text></svg>">
  <title>Minha Conta — Glins Store</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .page-wrap { padding: 80px 0; }
    .profile-layout { display: grid; grid-template-columns: 240px 1fr; gap: 32px; }
    .profile-sidebar .card { padding: 24px; text-align: center; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-surface); border: 2px solid var(--primary-dark); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 12px; }
    .profile-name { font-family: var(--font-title); font-size: 1.1rem; margin-bottom: 4px; }
    .profile-email { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; }
    .profile-nav { list-style: none; text-align: left; margin-top: 16px; }
    .profile-nav li { margin-bottom: 4px; }
    .profile-nav a { display: block; padding: 8px 12px; border-radius: var(--radius); color: var(--text-light); font-size: 0.88rem; transition: var(--transition); }
    .profile-nav a:hover, .profile-nav a.active { background: rgba(201,162,39,0.1); color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Order cards */
    .order-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; transition: var(--transition); cursor: pointer; }
    .order-card:hover { border-color: var(--border-gold); transform: translateY(-1px); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .order-id { font-family: var(--font-title); font-size: 0.9rem; }
    .order-items-preview { font-size: 0.85rem; color: var(--text-muted); }
    .order-total { font-family: var(--font-title); color: var(--primary); margin-top: 8px; }
    .order-hint { margin-top: 8px; font-size: 0.78rem; color: var(--primary); opacity: 0.7; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--bg-card); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal h2 { margin-bottom: 24px; font-size: 1.2rem; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--danger); }

    /* Order detail */
    .order-items-list { margin: 16px 0; }
    .order-item-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-row img { width: 56px; height: 56px; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); flex-shrink: 0; }
    .order-item-info { flex: 1; }
    .order-item-info strong { display: block; font-size: 0.88rem; }
    .order-item-info span { font-size: 0.8rem; color: var(--text-muted); }
    .order-summary { background: var(--bg-surface); border-radius: var(--radius); padding: 16px; margin: 16px 0; }
    .order-summary-row { display: flex; justify-content: space-between; font-size: 0.88rem; padding: 4px 0; color: var(--text-muted); }
    .order-summary-row.total { font-family: var(--font-title); color: var(--primary); font-size: 1rem; padding-top: 10px; border-top: 1px solid var(--border); margin-top: 6px; }
    .product-thumb-placeholder { width: 56px; height: 56px; background: var(--bg-surface); border-radius: var(--radius); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .info-label { font-size: 0.72rem; color: var(--primary); font-family: var(--font-title); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .tracking-box { background: rgba(201,162,39,0.08); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; font-size: 0.88rem; }

    @media (max-width: 768px) {
      .profile-layout { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="modal-container"></div>

<div class="page-wrap">
  <div class="container">
    <div class="profile-layout">

      <!-- Sidebar -->
      <div class="profile-sidebar">
        <div class="card">
          <div class="avatar">🧙</div>
          <div class="profile-name" id="sidebarName">—</div>
          <div class="profile-email" id="sidebarEmail">—</div>
          <ul class="profile-nav">
            <li><a href="#" class="active" onclick="showTab('orders', this)">📋 Meus Pedidos</a></li>
            <li><a href="#" onclick="showTab('profile', this)">👤 Meus Dados</a></li>
            <li><a href="#" onclick="showTab('address', this)">📍 Endereço</a></li>
            <li><a href="#" onclick="showTab('password', this)">🔑 Senha</a></li>
          </ul>
        </div>
      </div>

      <!-- Conteúdo -->
      <div>

        <!-- Pedidos -->
        <div id="tab-orders" class="tab-content active">
          <h2 class="mb-3">📋 Meus Pedidos</h2>
          <div id="orders-list"><div class="loader"></div></div>
        </div>

        <!-- Dados -->
        <div id="tab-profile" class="tab-content">
          <h2 class="mb-3">👤 Meus Dados</h2>
          <div class="card">
            <form id="profileForm">
              <div class="grid-2">
                <div class="form-group">
                  <label>Nome</label>
                  <input type="text" id="pName" class="form-control"/>
                </div>
                <div class="form-group">
                  <label>Telefone</label>
                  <input type="tel" id="pPhone" class="form-control"/>
                </div>
              </div>
              <button type="submit" class="btn btn-primary">💾 Salvar</button>
            </form>
          </div>
        </div>

        <!-- Endereço -->
        <div id="tab-address" class="tab-content">
          <h2 class="mb-3">📍 Endereço de Entrega</h2>
          <div class="card">
            <form id="addressForm">
              <div class="grid-2">
                <div class="form-group" style="grid-column:1/-1">
                  <label>CEP</label>
                  <input type="text" id="aZipcode" class="form-control" placeholder="00000-000" maxlength="9"/>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                  <label>Rua</label>
                  <input type="text" id="aStreet" class="form-control"/>
                </div>
                <div class="form-group">
                  <label>Número</label>
                  <input type="text" id="aNumber" class="form-control"/>
                </div>
                <div class="form-group">
                  <label>Complemento</label>
                  <input type="text" id="aComplement" class="form-control"/>
                </div>
                <div class="form-group">
                  <label>Cidade</label>
                  <input type="text" id="aCity" class="form-control"/>
                </div>
                <div class="form-group">
                  <label>Estado</label>
                  <input type="text" id="aState" class="form-control" maxlength="2" placeholder="MG"/>
                </div>
              </div>
              <button type="submit" class="btn btn-primary">💾 Salvar Endereço</button>
            </form>
          </div>
        </div>

        <!-- Senha -->
        <div id="tab-password" class="tab-content">
          <h2 class="mb-3">🔑 Alterar Senha</h2>
          <div class="card" style="max-width:400px">
            <form id="passwordForm">
              <div class="form-group">
                <label>Senha Atual</label>
                <input type="password" id="oldPwd" class="form-control"/>
              </div>
              <div class="form-group">
                <label>Nova Senha</label>
                <input type="password" id="newPwd" class="form-control"/>
              </div>
              <div class="form-group">
                <label>Confirmar Nova Senha</label>
                <input type="password" id="newPwd2" class="form-control"/>
              </div>
              <button type="submit" class="btn btn-primary">🔑 Alterar Senha</button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/navbar.js"></script>
<script>
  if (!requireAuth()) {}

  let userData = null;

  // ── Navegação entre abas ──────────────────────
  function showTab(tab, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.profile-nav a').forEach(a => a.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    el?.classList.add('active');
  }

  // ── Helper ────────────────────────────────────
  function toArray(response) {
    if (!response) return [];
    if (Array.isArray(response)) return response;
    if (Array.isArray(response.results)) return response.results;
    return [];
  }

  // ── Init ──────────────────────────────────────
  async function init() {
    userData = await API.auth.profile();
    initViaCEP('aZipcode', 'aStreet', 'aCity', 'aState', 'aNumber');
    document.getElementById('sidebarName').textContent  = userData.name;
    document.getElementById('sidebarEmail').textContent = userData.email;
    document.getElementById('pName').value       = userData.name  || '';
    document.getElementById('pPhone').value      = userData.phone || '';
    document.getElementById('aZipcode').value    = userData.zipcode    || '';
    document.getElementById('aStreet').value     = userData.street     || '';
    document.getElementById('aNumber').value     = userData.number     || '';
    document.getElementById('aComplement').value = userData.complement || '';
    document.getElementById('aCity').value       = userData.city       || '';
    document.getElementById('aState').value      = userData.state      || '';
    loadOrders();
  }

  // ── Pedidos (lista) ───────────────────────────
  async function loadOrders() {
    const el = document.getElementById('orders-list');
    try {
      const orders = await API.orders.list();
      if (!orders.length) {
        el.innerHTML = `
          <div class="text-muted text-center" style="padding:40px">
            Você ainda não fez nenhum pedido.
            <br/><a href="/pages/products.html" class="btn btn-primary mt-2">⚔️ Explorar Produtos</a>
          </div>`;
        return;
      }
      el.innerHTML = orders.map(o => `
        <div class="order-card" onclick="openOrderModal(${o.id})">
          <div class="order-header">
            <span class="order-id">Pedido #${o.id}</span>
            ${statusBadge(o.status)}
          </div>
          <div class="order-items-preview">
            ${o.items.map(i => `${i.name} × ${i.quantity}`).join(' · ')}
          </div>
          ${o.tracking_code
            ? `<div class="mt-1" style="font-size:0.82rem;color:var(--text-muted)">
                 📦 Rastreio: <strong>${o.tracking_code}</strong>
               </div>`
            : ''}
          <div class="order-total">${formatPrice(o.total)} · ${formatDate(o.created_at)}</div>
          <div class="order-hint">🔍 Clique para ver detalhes</div>
        </div>
      `).join('');
    } catch (_) {
      el.innerHTML = '<p class="text-muted">Erro ao carregar pedidos.</p>';
    }
  }

  // ── Modal: fechar ─────────────────────────────
  function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
  }

  document.getElementById('modal-container').addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay')) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ── Modal: detalhe do pedido ──────────────────
  async function openOrderModal(id) {
    closeModal();

    const container = document.getElementById('modal-container');
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>📋 Pedido <span style="color:var(--primary)">#${id}</span></h2>
        <div id="orderDetail"><div class="loader" style="margin:20px auto"></div></div>
      </div>`;
    container.appendChild(modal);

    try {
      const o = await API.orders.detail(id);
      const items = toArray(o.items || o.order_items);

      document.getElementById('orderDetail').innerHTML = `

        ${o.tracking_code ? `
          <div class="tracking-box">
            🚚 Código de rastreio: <strong>${o.tracking_code}</strong>
          </div>` : ''}

        <div class="info-label">🛍️ Itens do Pedido</div>
        <div class="order-items-list">
          ${items.length ? items.map(item => {
            const name  = item.product_name || item.name || item.product?.name || `Produto #${item.product}`;
            const img   = item.product_image || item.image || item.product?.image_url || null;
            const price = parseFloat(item.price || item.unit_price || 0);
            const qty   = item.quantity || 1;
            return `
              <div class="order-item-row">
                ${img
                  ? `<img src="${img}" alt="${name}" onerror="this.style.opacity='0.3'"/>`
                  : `<div class="product-thumb-placeholder">🏺</div>`}
                <div class="order-item-info">
                  <strong>${name}</strong>
                  <span>Qtd: ${qty} × ${formatPrice(price)}</span>
                </div>
                <strong style="white-space:nowrap">${formatPrice(qty * price)}</strong>
              </div>`;
          }).join('')
          : '<p class="text-muted" style="padding:12px 0">Sem itens registrados.</p>'}
        </div>

        <div class="order-summary">
          <div class="order-summary-row">
            <span>Subtotal</span>
            <span>${formatPrice(o.subtotal || o.total)}</span>
          </div>
          ${o.shipping_cost ? `
            <div class="order-summary-row">
              <span>🚚 Frete</span>
              <span>${formatPrice(o.shipping_cost)}</span>
            </div>` : ''}
          ${o.discount ? `
            <div class="order-summary-row">
              <span>🏷️ Desconto</span>
              <span>-${formatPrice(o.discount)}</span>
            </div>` : ''}
          <div class="order-summary-row total">
            <span>Total</span>
            <span>${formatPrice(o.total)}</span>
          </div>
        </div>

        ${o.street ? `
          <div class="info-label">📍 Endereço de Entrega</div>
          <div style="font-size:0.88rem;color:var(--text-muted);margin-bottom:16px;line-height:1.6">
            ${o.street}, ${o.number}${o.complement ? ` — ${o.complement}` : ''}<br/>
            ${o.city} / ${o.state} &nbsp;·&nbsp; CEP: ${o.zipcode}
          </div>` : ''}

        <div style="text-align:right">
          <button class="btn btn-outline" onclick="closeModal()">Fechar</button>
        </div>`;

    } catch (e) {
      document.getElementById('orderDetail').innerHTML =
        `<p class="text-muted text-center" style="padding:20px">
           Erro ao carregar detalhes do pedido.
         </p>`;
    }
  }

  // ── Salvar dados pessoais ─────────────────────
  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await API.auth.updateProfile({
        name:  document.getElementById('pName').value,
        phone: document.getElementById('pPhone').value,
      });
      showToast('Dados atualizados! ✅', 'success');
    } catch (_) { showToast('Erro ao salvar', 'error'); }
  });

  // ── Salvar endereço ───────────────────────────
  document.getElementById('addressForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await API.auth.updateProfile({
        name:       userData?.name  || document.getElementById('pName').value,
        phone:      userData?.phone || document.getElementById('pPhone').value,
        zipcode:    document.getElementById('aZipcode').value,
        street:     document.getElementById('aStreet').value,
        number:     document.getElementById('aNumber').value,
        complement: document.getElementById('aComplement').value,
        city:       document.getElementById('aCity').value,
        state:      document.getElementById('aState').value,
      });
      showToast('Endereço salvo! ✅', 'success');
    } catch (err) {
      showToast(err?.error || 'Erro ao salvar endereço', 'error');
    }
  });

  // ── Alterar senha ─────────────────────────────
  document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (document.getElementById('newPwd').value !== document.getElementById('newPwd2').value) {
      showToast('As senhas não coincidem', 'error'); return;
    }
    try {
      await API.auth.changePassword({
        old_password: document.getElementById('oldPwd').value,
        new_password: document.getElementById('newPwd').value,
      });
      showToast('Senha alterada! 🔑', 'success');
      document.getElementById('passwordForm').reset();
    } catch (err) {
      showToast(err.error || 'Erro ao alterar senha', 'error');
    }
  });

  init();
</script>
</body>
</html>
