<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <title>Carrinho — Glins Store</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <style>
    .page-wrap { padding: 80px 0; min-height: 80vh; }
    .page-title { font-size: 2rem; margin-bottom: 32px; }
    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 32px; align-items: start; }
    .cart-item {
      display: grid; grid-template-columns: 90px 1fr auto;
      gap: 16px; align-items: center;
      padding: 16px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 12px; transition: var(--transition);
    }
    .cart-item:hover { border-color: var(--border-gold); }
    .cart-img { width: 90px; height: 90px; object-fit: cover; border-radius: var(--radius); background: var(--bg-surface); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .cart-item-name { font-family: var(--font-title); font-size: 0.95rem; margin-bottom: 4px; }
    .cart-item-price { color: var(--primary); font-weight: 700; margin-bottom: 10px; }
    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-btn { width: 30px; height: 30px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-light); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
    .qty-value { min-width: 28px; text-align: center; font-family: var(--font-title); }
    .cart-subtotal { font-family: var(--font-title); color: var(--primary); font-size: 1rem; text-align: right; }
    .remove-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; padding: 4px; transition: var(--transition); }
    .remove-btn:hover { color: var(--danger); }
    .summary-card { position: sticky; top: 80px; }
    .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.92rem; }
    .summary-total { display: flex; justify-content: space-between; padding: 16px 0 0; font-family: var(--font-title); font-size: 1.2rem; color: var(--primary); }
    .empty-cart { text-align: center; padding: 80px 20px; }
    .empty-cart .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .summary-card { position: static; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <h1 class="page-title">🛒 Meu Carrinho</h1>
    <div id="cart-content"><div class="loader"></div></div>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/navbar.js"></script>
<script>
  if (!requireAuth()) {}

  async function loadCart() {
    const el = document.getElementById('cart-content');
    try {
      const cart = await API.cart.get();

      if (!cart.items.length) {
        el.innerHTML = `
          <div class="empty-cart">
            <div class="empty-icon">🛒</div>
            <h2>Seu carrinho está vazio</h2>
            <p class="text-muted mb-3">Explore nossos produtos e adicione ao carrinho</p>
            <a href="/pages/products.html" class="btn btn-primary btn-lg">⚔️ Ver Produtos</a>
          </div>`;
        return;
      }

      el.innerHTML = `
        <div class="cart-layout">
          <div id="cart-items">${renderItems(cart.items)}</div>
          <div class="card summary-card">
            <h3 style="margin-bottom:16px">📜 Resumo</h3>
            <div class="summary-row"><span>Subtotal</span><span id="summary-sub">${formatPrice(cart.total)}</span></div>
            <div class="summary-row"><span>Frete</span><span class="text-muted">A calcular</span></div>
            <div class="summary-total"><span>Total</span><span id="summary-total">${formatPrice(cart.total)}</span></div>
            <button class="btn btn-primary btn-block btn-lg mt-3" onclick="goCheckout()">
              🗡️ Finalizar Compra
            </button>
            <button class="btn btn-danger btn-block mt-1" onclick="clearCart()">
              🗑️ Limpar Carrinho
            </button>
          </div>
        </div>`;
    } catch (_) {
      el.innerHTML = '<p class="text-muted text-center">Erro ao carregar carrinho.</p>';
    }
  }

  function renderItems(items) {
    return items.map(item => `
      <div class="cart-item" id="item-${item.id}">
        <div class="cart-img">
          ${item.product.image_url
            ? `<img src="${item.product.image_url}" alt="${item.product.name}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius)"/>`
            : '🏺'}
        </div>
        <div>
          <div class="cart-item-name">${item.product.name}</div>
          <div class="cart-item-price">${formatPrice(item.product.price)}</div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(${item.id}, ${item.quantity - 1})">−</button>
            <span class="qty-value" id="qty-${item.id}">${item.quantity}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, ${item.quantity + 1})">+</button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <button class="remove-btn" onclick="removeItem(${item.id})">🗑️</button>
          <div class="cart-subtotal">${formatPrice(item.subtotal)}</div>
        </div>
      </div>
    `).join('');
  }

  async function changeQty(id, qty) {
    try {
      if (qty <= 0) { await removeItem(id); return; }
      await API.cart.update(id, qty);
      loadCart();
      updateCartBadge();
    } catch (err) {
      showToast(err.error || 'Erro ao atualizar', 'error');
    }
  }

  async function removeItem(id) {
    try {
      await API.cart.remove(id);
      showToast('Item removido', 'info');
      loadCart();
      updateCartBadge();
    } catch (_) {}
  }

  async function clearCart() {
    if (!confirm('Limpar o carrinho?')) return;
    try {
      await API.cart.clear();
      loadCart();
      updateCartBadge();
    } catch (_) {}
  }

  function goCheckout() {
    window.location.href = '/pages/checkout.html';
  }

  loadCart();
</script>
</body>
</html>
